
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notepad Pribadi</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, deleteUser } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Konfigurasi Firebase
        const firebaseConfig = {
  apiKey: "AIzaSyDroZm6lszC_GYHim6AB4phb5-clCYfL2M",
  authDomain: "notepad-355e9.firebaseapp.com",
  projectId: "notepad-355e9",
  storageBucket: "notepad-355e9.firebasestorage.app",
  messagingSenderId: "185131514507",
  appId: "1:185131514507:web:e29e0cc5da5cc954a1b28e"
};

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const authPage = document.getElementById('auth-page');
        const notepadPage = document.getElementById('notepad-page');
        const noteArea = document.getElementById('note-area');
        const emailInput = document.getElementById('email');
        const passInput = document.getElementById('password');

        onAuthStateChanged(auth, (user) => {
            if (user) {
                authPage.classList.add('hidden');
                notepadPage.classList.remove('hidden');
                loadNote(user.uid);
            } else {
                authPage.classList.remove('hidden');
                notepadPage.classList.add('hidden');
            }
        });
function togglePassword() {
    
    const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
    passwordInput.setAttribute('type', type);
        }
        
        window.handleAuth = async (isRegister) => {
            try {
                if (isRegister) await createUserWithEmailAndPassword(auth, emailInput.value, passInput.value);
                else await signInWithEmailAndPassword(auth, emailInput.value, passInput.value);
            } catch (e) { alert("Error: " + e.message); }
        };

        window.logout = () => signOut(auth);

        window.saveNote = async () => {
            const user = auth.currentUser;
            if (user) {
                await setDoc(doc(db, "notes", user.uid), { content: noteArea.value });
                alert("Catatan tersimpan!");
            }
        };

        window.deleteAccount = async () => {
            if (confirm("Apakah Anda yakin ingin menghapus akun dan semua catatan Anda secara permanen?")) {
                try {
                    const user = auth.currentUser;
                    // Hapus dokumen catatan di Firestore
                    await deleteDoc(doc(db, "notes", user.uid));
                    // Hapus akun di Auth
                    await deleteUser(user);
                    alert("Akun berhasil dihapus.");
                } catch (e) { alert("Gagal menghapus akun: " + e.message); }
            }
        };

        async function loadNote(uid) {
            const docRef = doc(db, "notes", uid);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) noteArea.value = docSnap.data().content;
            else noteArea.value = "";
        }
    </script>
</head>
<body class="bg-gray-100 p-4">
    <div id="auth-page" class="max-w-md mx-auto mt-20 bg-white p-6 rounded shadow">
        <h1 class="text-2xl mb-4 font-bold">Notepad Login</h1>
        <input id="email" type="email" placeholder="Email" class="w-full border p-2 mb-2 rounded">
        <input id="password" type="password" placeholder="Password" class="w-full border p-2 mb-4 rounded">
        <button 
      type="button" 
      onclick="togglePassword()"
      class="absolute inset-y-0 right-0 flex items-center px-3 text-gray-500 hover:text-indigo-600 focus:outline-none"
    >
      <svg id="eye-icon" xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" />
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" />
      </svg>
        </button>
        
        <div class="flex gap-2">
            <button onclick="handleAuth(false)" class="bg-blue-500 text-white px-4 py-2 rounded flex-1">Login</button>
            <button onclick="handleAuth(true)" class="bg-green-500 text-white px-4 py-2 rounded flex-1">Daftar</button>
        </div>
    </div>

    <div id="notepad-page" class="hidden max-w-2xl mx-auto mt-10">
        <div class="flex justify-between mb-4 items-center">
            <h2 class="text-xl font-bold">Catatan Saya</h2>
            <div class="flex gap-2">
                <button onclick="logout()" class="text-gray-600 underline">Logout</button>
                <button onclick="deleteAccount()" class="text-red-600 underline text-sm">Hapus Akun</button>
            </div>
        </div>
        <textarea id="note-area" class="w-full h-64 p-4 border rounded mb-4 shadow-sm" placeholder="Tulis sesuatu di sini..."></textarea>
        <button onclick="saveNote()" class="bg-blue-600 text-white px-6 py-2 rounded w-full font-bold">Simpan Catatan</button>
    </div>
</body>
</html>
